<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishPath — CEFR Learning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F2EC;--surface:#FEFCF8;--surface2:#F0ECE4;--text:#1A1714;--text2:#6B6560;--text3:#9E9892;--accent:#2C4A3E;--accent2:#4A7C6F;--accent-light:#E8F0EE;--gold:#C8922A;--gold-light:#FBF3E3;--red:#B84040;--red-light:#FAEAEA;--border:rgba(26,23,20,0.1);--border2:rgba(26,23,20,0.06);--shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.1);--r:10px;--r-lg:16px;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--accent);padding:2rem}
.auth-card{background:var(--surface);border-radius:var(--r-lg);padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-logo{font-family:var(--font-display);font-size:2rem;color:var(--accent);margin-bottom:.25rem}
.auth-logo span{color:var(--gold)}
.auth-subtitle{color:var(--text2);font-size:14px;margin-bottom:2rem}
.auth-tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface2);border-radius:8px;padding:4px}
.auth-tab{flex:1;padding:.5rem;text-align:center;cursor:pointer;border-radius:6px;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:transparent}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;padding:.65rem 1rem;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);font-family:var(--font-body);font-size:15px;color:var(--text);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--accent2)}
.btn-primary{width:100%;padding:.8rem;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn-primary:hover{background:var(--accent2)}
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--accent);display:flex;flex-direction:column;padding:1.5rem 0;z-index:100;overflow-y:auto}
.sidebar-logo{font-family:var(--font-display);font-size:1.5rem;color:#fff;padding:0 1.5rem;margin-bottom:2rem}
.sidebar-logo span{color:var(--gold)}
.sidebar-section{padding:0 1rem;margin-bottom:.5rem}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.4);padding:0 .5rem;margin-bottom:.5rem;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:.6rem .75rem;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);font-size:14px;font-weight:400;transition:all .15s;border:none;background:transparent;width:100%;text-align:left}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:500}
.sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,.1);font-size:13px;color:rgba(255,255,255,.5)}
.sidebar-user{color:rgba(255,255,255,.85);font-weight:500;margin-bottom:2px}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:12px;padding:0;font-family:var(--font-body)}
.logout-btn:hover{color:rgba(255,255,255,.7)}
.main{margin-left:240px;padding:2rem 2.5rem;min-height:100vh}
.page-header{margin-bottom:2rem}
.page-header h1{font-family:var(--font-display);font-size:1.75rem;font-weight:500}
.page-header p{color:var(--text2);font-size:14px;margin-top:4px}
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border2);padding:1.5rem;box-shadow:var(--shadow)}
.card-title{font-weight:600;font-size:15px;margin-bottom:1rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border-radius:var(--r);padding:1.25rem 1.5rem;border:1px solid var(--border2)}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-value{font-family:var(--font-display);font-size:2rem;font-weight:500}
.stat-sub{font-size:12px;color:var(--text3);margin-top:2px}
.level-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.04em}
.level-a1{background:#EAF7EC;color:#2A7D3A}
.level-a2{background:#E8F4E8;color:#3A7A2A}
.level-b1{background:#FBF3E3;color:#9B6B1A}
.level-b2{background:#FEF0D8;color:#B87820}
.level-c1{background:#F0EBF8;color:#6B3EA8}
.level-c2{background:#EBE8F8;color:#5430A0}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.module-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border2);overflow:hidden;transition:box-shadow .2s,transform .2s;cursor:pointer}
.module-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.module-card.locked{opacity:.55;cursor:default}
.module-card.locked:hover{box-shadow:var(--shadow);transform:none}
.module-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-start}
.module-body{padding:1rem 1.5rem 1.25rem}
.module-title{font-weight:600;font-size:15px;margin-bottom:4px}
.module-desc{font-size:13px;color:var(--text2);line-height:1.5}
.module-footer{padding:.75rem 1.5rem;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2)}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width .5s}
.lesson-header{background:var(--accent);color:#fff;padding:1.5rem 2rem;border-radius:var(--r-lg);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between}
.lesson-title{font-family:var(--font-display);font-size:1.5rem}
.lesson-subtitle{font-size:14px;opacity:.7;margin-top:4px}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.vocab-item{background:var(--bg);border-radius:8px;padding:.75rem 1rem;border:1px solid var(--border)}
.vocab-word{font-weight:600;font-size:15px}
.vocab-phonetic{font-size:12px;color:var(--text3);margin:2px 0;font-style:italic}
.vocab-def{font-size:13px;color:var(--text2)}
.vocab-example{font-size:12px;color:var(--text3);margin-top:4px;font-style:italic}
.exercise{margin-bottom:1.5rem}
.exercise-q{font-weight:500;margin-bottom:.75rem}
.exercise-options{display:flex;flex-direction:column;gap:.5rem}
.option-btn{padding:.65rem 1rem;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);text-align:left;cursor:pointer;font-family:var(--font-body);font-size:14px;color:var(--text);transition:all .15s}
.option-btn:hover{border-color:var(--accent2);background:var(--accent-light)}
.option-btn.correct{background:#EAF7EC;border-color:#2A7D3A;color:#2A7D3A}
.option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
.fill-input{width:100%;padding:.65rem 1rem;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);font-family:var(--font-body);font-size:15px;color:var(--text);outline:none}
.fill-input:focus{border-color:var(--accent2)}
.teacher-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.module-manager-item{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--border2)}
.module-manager-item:last-child{border-bottom:none}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{width:100%;height:100%;background:var(--surface2);border-radius:12px;border:1px solid var(--border);transition:background .2s}
.toggle-switch input:checked~.toggle-track{background:var(--accent2);border-color:var(--accent2)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-switch input:checked~.toggle-thumb{transform:translateX(20px)}
.btn-sm{padding:.4rem 1rem;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn-sm:hover{background:var(--surface2)}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sm.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm.danger{background:var(--red-light);color:var(--red);border-color:var(--red)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:12px;font-weight:600;color:var(--text2);text-align:left;padding:.75rem 1rem;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
td{padding:.85rem 1rem;border-bottom:1px solid var(--border2);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0}
.student-name{display:flex;align-items:center}
.notif{position:fixed;top:1.5rem;right:1.5rem;z-index:999;background:var(--accent);color:#fff;padding:1rem 1.5rem;border-radius:var(--r);box-shadow:var(--shadow-lg);font-size:14px;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.notif.show{opacity:1;transform:translateY(0)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{padding:.75rem 1.25rem;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-body)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group select,.form-group textarea{width:100%;padding:.65rem 1rem;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);font-family:var(--font-body);font-size:15px;color:var(--text);outline:none}
.form-group textarea{resize:vertical;min-height:80px}
.result-banner{padding:1.5rem;border-radius:var(--r-lg);text-align:center;margin-top:1rem}
.result-banner.pass{background:#EAF7EC;border:1px solid #8FD0A0}
.result-banner.fail{background:var(--red-light);border:1px solid #E8AAAA}
.result-score{font-family:var(--font-display);font-size:3rem;font-weight:700}
.result-banner.pass .result-score{color:#2A7D3A}
.result-banner.fail .result-score{color:var(--red)}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text2);cursor:pointer;font-family:var(--font-body);font-size:14px;padding:0;margin-bottom:1.25rem}
.back-btn:hover{color:var(--text)}
.empty-state{text-align:center;padding:3rem;color:var(--text2)}
.grammar-box{background:var(--accent-light);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem}
.grammar-rule{display:grid;grid-template-columns:160px 1fr;gap:1rem;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:13px}
.grammar-rule:last-child{border-bottom:none}
.tip-box{background:var(--gold-light);border:1px solid var(--gold);border-radius:8px;padding:.75rem 1rem;font-size:13px;margin-top:.75rem}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.contact-info-item{display:flex;align-items:flex-start;gap:1rem;padding:1.25rem;background:var(--bg);border-radius:var(--r);border:1px solid var(--border2)}
.contact-info-icon{width:42px;height:42px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.contact-info-label{font-size:12px;color:var(--text3);margin-bottom:2px}
.contact-info-value{font-size:14px;font-weight:500;color:var(--text)}
.contact-form-group{margin-bottom:1rem}
.contact-form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.contact-success{background:#EAF7EC;border:1px solid #8FD0A0;border-radius:var(--r);padding:1.25rem;text-align:center;font-size:14px;color:#2A7D3A;display:none}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">English<span>Path</span></div>
    <p class="auth-subtitle">Plataforma de inglês CEFR — A1 ao C2</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Cadastrar</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>E-mail</label><input class="form-input" type="email" id="login-email" placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha</label><input class="form-input" type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar na plataforma</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Nome completo</label><input class="form-input" type="text" id="reg-name" placeholder="Seu nome"></div>
      <div class="form-group"><label>E-mail</label><input class="form-input" type="email" id="reg-email" placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha</label><input class="form-input" type="password" id="reg-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doRegister()">Criar conta de aluno</button>
    </div>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:1rem">v4.0 — EnglishPath</p>
  </div>
</div>
<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">English<span>Path</span></div>
    <div id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-name"></div>
      <div id="sidebar-role" style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:6px"></div>
      <button class="logout-btn" onclick="doLogout()">Sair da conta</button>
    </div>
  </nav>
  <main class="main" id="main-content"></main>
</div>
<div class="notif" id="notif"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDuJnuCUh1FqhdCFcpcvzMNoMr0P7aZ8i4",
  authDomain: "englishpath-5d3fd.firebaseapp.com",
  projectId: "englishpath-5d3fd",

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// ── DATA ─────────────────────────────────────
const MODULES = [
  {id:'a1',level:'A1',title:'Beginner',desc:'Fundamentos do inglês: saudações, números, cores e apresentações.',unlocked:true,order:1},
  {id:'a2',level:'A2',title:'Elementary',desc:'Rotinas diárias, família, presente simples e vocabulário essencial.',unlocked:true,order:2},
  {id:'b1',level:'B1',title:'Intermediate',desc:'Viagens, passado simples, expressões idiomáticas e conversação.',unlocked:false,order:3},
  {id:'b2',level:'B2',title:'Upper-Intermediate',desc:'Negócios, passiva, tempos verbais avançados e escrita formal.',unlocked:false,order:4},
  {id:'c1',level:'C1',title:'Advanced',desc:'Nuances da língua, textos acadêmicos, debates e argumentação.',unlocked:false,order:5},

const LESSONS = {
  a1:[
    {id:'a1-l1',title:'Greetings & Introductions',unlocked:true,
     grammar:{title:'Verb "To Be" — Presente',explanation:'O verbo "to be" significa "ser" ou "estar". É o verbo mais importante do inglês!',
       rules:[{s:'I',f:'am',e:'I am Ana. (Eu sou Ana.)'},{s:'You',f:'are',e:'You are a student.'},{s:'He/She/It',f:'is',e:'She is my teacher.'},{s:'We/They',f:'are',e:'We are friends.'}],
       tip:'💡 "I am" = "I\'m" | "You are" = "You\'re" | "He is" = "He\'s"'},
     listening:{title:'🎧 A conversation at school',
       transcript:[{sp:'Ana',ln:"Hello! My name is Ana. What's your name?"},{sp:'Tom',ln:"Hi Ana! I'm Tom. Nice to meet you!"},{sp:'Ana',ln:"Nice to meet you too! Are you a student here?"},{sp:'Tom',ln:"Yes, I am. I'm in level A1. And you?"},{sp:'Ana',ln:"Me too! See you in class. Goodbye!"},{sp:'Tom',ln:"Goodbye! See you later!"}],
       questions:[{q:"What is the girl's name?",o:['Maria','Ana','Sara','Lisa'],a:1},{q:"What level is Tom in?",o:['B1','A2','A1','C1'],a:2},{q:"How does Ana say goodbye?",o:['Sorry!','Please!','Goodbye!','Thank you!'],a:2}]},
     vocab:[{w:'Hello',p:'/həˈloʊ/',d:'Olá, oi',e:'"Hello! My name is Ana."'},{w:'Goodbye',p:'/ˌɡʊdˈbaɪ/',d:'Tchau, adeus',e:'"Goodbye! See you tomorrow."'},{w:'Please',p:'/pliːz/',d:'Por favor',e:'"Please, help me."'},{w:'Thank you',p:'/ˈθæŋk juː/',d:'Obrigado(a)',e:'"Thank you very much!"'},{w:'Sorry',p:"/ˈsɒri/",d:'Desculpe',e:'"Sorry, I don\'t understand."'},{w:'Excuse me',p:'/ɪkˈskjuːz miː/',d:'Com licença',e:'"Excuse me, where is the library?"'},{w:'Nice to meet you',p:'/naɪs tə miːt juː/',d:'Prazer em conhecê-lo(a)',e:'"Nice to meet you, Tom!"'},{w:'See you later',p:'/siː juː ˈleɪtər/',d:'Até mais tarde',e:'"See you later, Ana!"'}],
     exercises:[{t:'m',q:'What does "goodbye" mean?',o:['Olá','Obrigado','Tchau','Por favor'],a:2},{t:'m',q:'How do you say "por favor"?',o:['Sorry','Please','Hello','Thanks'],a:1},{t:'f',q:'Complete: "___ you very much!"',a:'thank'},{t:'m',q:'"Excuse me" means...',o:['Desculpe','Com licença','Oi','Adeus'],a:1},{t:'m',q:'"Nice to meet you" means...',o:['Até logo','Com licença','Prazer em conhecê-lo','Desculpe'],a:2},{t:'f',q:'Complete: "I ___ a student." (sou)',a:'am'},{t:'m',q:'Which is correct? "She ___ my teacher."',o:['am','are','is','be'],a:2},{t:'f',q:'Complete: "We ___ friends." (somos)',a:'are'},{t:'m',q:'Short form of "I am" is...',o:["I'm","I's","Im","Iam"],a:0},{t:'m',q:'"See you later" means...',o:['Bom dia','Até mais tarde','Com licença','Desculpe'],a:1}]},
    {id:'a1-l2',title:'Numbers 1–20',unlocked:true,
     grammar:{title:'How old are you? — Perguntar a idade',explanation:'Para perguntar e responder sobre idade usamos o verbo "to be":',
       rules:[{s:'Pergunta',f:'How old are you?',e:'Quantos anos você tem?'},{s:'Resposta',f:'I am + número + years old',e:'I am fifteen years old.'},{s:'Pergunta (ele/ela)',f:'How old is he/she?',e:'How old is she?'},{s:'Resposta',f:'He/She is + número + years old',e:'He is ten years old.'}],
       tip:"💡 Em inglês informal é comum dizer apenas 'I'm fifteen.' sem o 'years old'."},
     listening:{title:'🎧 At the birthday party',

// Module unlock state — only this comes from Firebase

let DB_LESSON_UNLOCKS = {}; // {'a1-l1':true, 'a1-l2':false, ...}

function getModuleUnlocked(modId) {
  if (DB_MODULE_UNLOCKS[modId] !== undefined) return DB_MODULE_UNLOCKS[modId];
  return MODULES.find(m=>m.id===modId)?.unlocked || false;
}
function getLessonUnlocked(lessonId) {
  if (DB_LESSON_UNLOCKS[lessonId] !== undefined) return DB_LESSON_UNLOCKS[lessonId];
  const lesson = Object.values(LESSONS).flat().find(l=>l.id===lessonId);
  return lesson?.unlocked || false;
}

// Firebase save/load — ONLY users and unlock states
async function saveUsers() {
  try { await setDoc(doc(db,'platform','users2'),{list:DB_USERS}); } catch(e) {}
}
async function saveUnlocks() {
  try { await setDoc(doc(db,'platform','unlocks'),{modules:DB_MODULE_UNLOCKS,lessons:DB_LESSON_UNLOCKS}); } catch(e) {}
}
async function loadFromFirebase() {
  try {
    const usersSnap = await getDoc(doc(db,'platform','users2'));
    if (usersSnap.exists() && usersSnap.data().list?.length) {
      const saved = usersSnap.data().list;
      DB_USERS = DB_USERS.map(u => { const s=saved.find(x=>x.email===u.email); return s?{...u,...s,password:u.password}:u; });
      saved.forEach(s=>{ if(!DB_USERS.find(u=>u.email===s.email)) DB_USERS.push(s); });
    }
    const unlockSnap = await getDoc(doc(db,'platform','unlocks'));
    if (unlockSnap.exists()) {
      DB_MODULE_UNLOCKS = unlockSnap.data().modules || {};
      DB_LESSON_UNLOCKS = unlockSnap.data().lessons || {};
    }
  } catch(e) { console.warn('Firebase load error',e); }
}

// App state
let currentUser = null, currentView = 'dashboard', currentLesson = null;
let quizAnswers = {}, quizSubmitted = false, listeningAnswers = {}, listeningSubmitted = false;

// AUTH
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
}
async function doLogin() {
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-password').value;
  if(!email||!pwd){showNotif('Preencha e-mail e senha.');return;}
  showNotif('Carregando...');
  await loadFromFirebase();
  const user=DB_USERS.find(u=>u.email===email&&u.password===pwd);
  if(!user){showNotif('E-mail ou senha incorretos.');return;}
  currentUser=user;
  startApp();
}
async function doRegister() {
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-password').value;
  if(!name||!email||!pwd){showNotif('Preencha todos os campos.');return;}
  await loadFromFirebase();
  if(DB_USERS.find(u=>u.email===email)){showNotif('E-mail já cadastrado.');return;}
  const newUser={id:Date.now(),name,email,password:pwd,role:'student',level:'A1',completedLessons:[],quizScores:{}};
  DB_USERS.push(newUser);
  await saveUsers();
  currentUser=newUser;
  showNotif(`Bem-vindo(a), ${name}!`);
  startApp();
}
function doLogout(){currentUser=null;document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex';}

function startApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sidebar-user-name').textContent=currentUser.name;
  document.getElementById('sidebar-role').textContent=currentUser.role==='teacher'?'👨‍🏫 Professor':'🎓 Aluno';
  buildSidebar();
  setTimeout(()=>navigate('dashboard'),100);
}

function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');
  if(currentUser.role==='teacher'){
    nav.innerHTML=`<div class="sidebar-section"><div class="sidebar-section-label">Principal</div><button class="sidebar-item" onclick="navigate('dashboard')">📊 Dashboard</button><button class="sidebar-item" onclick="navigate('students')">👥 Alunos</button></div><div class="sidebar-section"><div class="sidebar-section-label">Conteúdo</div><button class="sidebar-item" onclick="navigate('modules')">📚 Módulos & Aulas</button></div><div class="sidebar-section"><div class="sidebar-section-label">Acesso</div><button class="sidebar-item" onclick="navigate('access')">🔓 Controle de Acesso</button></div><div class="sidebar-section"><div class="sidebar-section-label">Suporte</div><button class="sidebar-item" onclick="navigate('contact')">✉️ Contato</button></div>`;
  } else {
    nav.innerHTML=`<div class="sidebar-section"><div class="sidebar-section-label">Aprendizado</div><button class="sidebar-item" onclick="navigate('dashboard')">🏠 Início</button><button class="sidebar-item" onclick="navigate('my-courses')">📖 Meus Cursos</button><button class="sidebar-item" onclick="navigate('progress')">📈 Meu Progresso</button></div><div class="sidebar-section"><div class="sidebar-section-label">Suporte</div><button class="sidebar-item" onclick="navigate('contact')">✉️ Contato</button></div>`;

  highlightNav();
}
function highlightNav(){document.querySelectorAll('.sidebar-item').forEach(b=>{b.classList.remove('active');if(b.textContent.toLowerCase().includes(currentView))b.classList.add('active');});}
function navigate(view,data){currentView=view;quizAnswers={};quizSubmitted=false;listeningAnswers={};listeningSubmitted=false;highlightNav();const main=document.getElementById('main-content');if(currentUser.role==='teacher')renderTeacher(view,data,main);else renderStudent(view,data,main);}

function levelBadge(level){const cls={A1:'level-a1',A2:'level-a2',B1:'level-b1',B2:'level-b2',C1:'level-c1',C2:'level-c2'};return `<span class="level-badge ${cls[level]||''}">${level}</span>`;}

function renderTeacher(view,data,el){
  if(view==='dashboard')el.innerHTML=teacherDashboard();
  else if(view==='students')el.innerHTML=teacherStudents();
  else if(view==='modules')el.innerHTML=teacherModules();
  else if(view==='access')el.innerHTML=teacherAccess();
  else if(view==='contact')el.innerHTML=contactPage();
}
function teacherDashboard(){
  const students=DB_USERS.filter(u=>u.role==='student');
  const totalL=Object.values(LESSONS).flat().length;
  const unlockedM=MODULES.filter(m=>getModuleUnlocked(m.id)).length;
  const completions=students.reduce((a,s)=>a+(s.completedLessons||[]).length,0);
  return `<div class="page-header"><h1>Painel do Professor</h1><p>Visão geral da plataforma EnglishPath</p></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Alunos</div><div class="stat-value">${students.length}</div></div>
    <div class="stat-card"><div class="stat-label">Módulos ativos</div><div class="stat-value">${unlockedM}</div></div>
    <div class="stat-card"><div class="stat-label">Total de aulas</div><div class="stat-value">${totalL}</div></div>
    <div class="stat-card"><div class="stat-label">Conclusões</div><div class="stat-value">${completions}</div></div>
  </div>
  <div class="teacher-grid">
    <div class="card"><div class="card-title">🎓 Progresso dos Alunos</div>${students.map(s=>{const done=(s.completedLessons||[]).length;const pct=totalL?Math.round(done/totalL*100):0;return `<div style="margin-bottom:1rem"><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span>${s.name}</span><span>${done}/${totalL} • ${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;}).join('')}</div>
    <div class="card"><div class="card-title">📚 Status dos Módulos</div>${MODULES.map(m=>`<div class="module-manager-item"><span style="font-size:14px">${levelBadge(m.level)} ${m.title}</span><label class="toggle-switch"><input type="checkbox" ${getModuleUnlocked(m.id)?'checked':''} onchange="toggleModule('${m.id}',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`).join('')}</div>
  </div>`;
}
function teacherStudents(){
  const students=DB_USERS.filter(u=>u.role==='student');
  const totalL=Object.values(LESSONS).flat().length;
  return `<div class="page-header"><h1>Alunos</h1></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Aluno</th><th>Nível</th><th>Aulas</th><th>Progresso</th><th>Ações</th></tr></thead><tbody>${students.map(s=>{const done=(s.completedLessons||[]).length;const pct=totalL?Math.round(done/totalL*100):0;const ini=s.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();return `<tr><td><div class="student-name"><div class="avatar">${ini}</div>${s.name}</div></td><td>${levelBadge(s.level||'A1')}</td><td>${done}/${totalL}</td><td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%"></div></div><span style="font-size:12px">${pct}%</span></div></td><td><div style="display:flex;gap:6px"><button class="btn-sm" onclick="promoteStudent(${s.id})">Promover</button><button class="btn-sm danger" onclick="resetStudent(${s.id})">Resetar</button></div></td></tr>`;}).join('')}</tbody></table></div></div>`;
}
function teacherModules(){
  return `<div class="page-header"><h1>Módulos & Aulas</h1></div>${MODULES.map(mod=>{const lessons=LESSONS[mod.id]||[];return `<div class="card" style="margin-bottom:1rem"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem"><div style="display:flex;align-items:center;gap:10px">${levelBadge(mod.level)}<span style="font-weight:600">${mod.title}</span><span style="font-size:13px;color:var(--text2)">${lessons.length} aulas</span></div><label class="toggle-switch"><input type="checkbox" ${getModuleUnlocked(mod.id)?'checked':''} onchange="toggleModule('${mod.id}',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div><div style="display:flex;flex-direction:column;gap:.5rem">${lessons.map(l=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:var(--bg);border-radius:8px;border:1px solid var(--border2)"><span style="font-size:14px">${getLessonUnlocked(l.id)?'✓':'🔒'} ${l.title}</span><label class="toggle-switch"><input type="checkbox" ${getLessonUnlocked(l.id)?'checked':''} onchange="toggleLesson('${l.id}',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`).join('')}</div></div>`;}).join('')}`;
}
function teacherAccess(){
  return `<div class="page-header"><h1>Controle de Acesso</h1></div><div class="teacher-grid"><div class="card"><div class="card-title">🔓 Módulos</div>${MODULES.map(m=>`<div class="module-manager-item">${levelBadge(m.level)} <span style="font-size:14px;margin-left:8px">${m.title}</span><label class="toggle-switch"><input type="checkbox" ${getModuleUnlocked(m.id)?'checked':''} onchange="toggleModule('${m.id}',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`).join('')}</div><div class="card"><div class="card-title">📖 Aulas</div>${MODULES.map(mod=>{const lessons=LESSONS[mod.id]||[];return `<div style="margin-bottom:1rem"><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:.5rem">${mod.level} ${mod.title}</div>${lessons.map(l=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border2)"><span style="font-size:13px">${l.title}</span><label class="toggle-switch"><input type="checkbox" ${getLessonUnlocked(l.id)?'checked':''} onchange="toggleLesson('${l.id}',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`).join('')}</div>`;}).join('')}</div></div>`;
}

// STUDENT
function renderStudent(view,data,el){
  if(view==='dashboard')el.innerHTML=studentDashboard();
  else if(view==='my-courses')el.innerHTML=studentCourses();
  else if(view==='progress')el.innerHTML=studentProgress();
  else if(view==='lesson')renderLesson(data,el);
  else if(view==='contact')el.innerHTML=contactPage();
}
function studentDashboard(){
  const allL=Object.values(LESSONS).flat();
  const done=(currentUser.completedLessons||[]).length;
  const pct=allL.length?Math.round(done/allL.length*100):0;
  const unlockedMods=MODULES.filter(m=>getModuleUnlocked(m.id));
  const nextLesson=allL.find(l=>getLessonUnlocked(l.id)&&!(currentUser.completedLessons||[]).includes(l.id));
  return `<div class="page-header"><h1>Olá, ${currentUser.name.split(' ')[0]}! 👋</h1><p>Continue aprendendo e avance no seu inglês</p></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Seu nível</div><div style="margin-top:6px">${levelBadge(currentUser.level||'A1')}</div></div>
    <div class="stat-card"><div class="stat-label">Aulas completas</div><div class="stat-value">${done}</div></div>
    <div class="stat-card"><div class="stat-label">Progresso</div><div class="stat-value">${pct}%</div><div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    <div class="stat-card"><div class="stat-label">Módulos ativos</div><div class="stat-value">${unlockedMods.length}</div></div>
  </div>
  ${nextLesson?`<div class="card" style="background:var(--accent);color:#fff;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem"><div><div style="font-size:12px;opacity:.6;margin-bottom:4px">CONTINUAR</div><div style="font-family:var(--font-display);font-size:1.25rem">${nextLesson.title}</div></div><button class="btn-sm" style="background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff" onclick="navigate('lesson','${nextLesson.id}')">Iniciar →</button></div>`:''}
  <div class="modules-grid">${MODULES.filter(m=>getModuleUnlocked(m.id)).map(m=>{const lessons=(LESSONS[m.id]||[]).filter(l=>getLessonUnlocked(l.id));const doneM=lessons.filter(l=>(currentUser.completedLessons||[]).includes(l.id)).length;const pctM=lessons.length?Math.round(doneM/lessons.length*100):0;return `<div class="module-card" onclick="navigate('my-courses')"><div class="module-header">${levelBadge(m.level)}<span style="font-size:13px;color:var(--text2)">${lessons.length} aulas</span></div><div class="module-body"><div class="module-title">${m.title}</div><div class="module-desc">${m.desc}</div><div class="progress-bar"><div class="progress-fill" style="width:${pctM}%"></div></div></div><div class="module-footer"><span>${doneM}/${lessons.length}</span><span style="color:var(--accent2)">${pctM}%</span></div></div>`;}).join('')}${MODULES.filter(m=>!getModuleUnlocked(m.id)).map(m=>`<div class="module-card locked"><div class="module-header">${levelBadge(m.level)}<span>🔒</span></div><div class="module-body"><div class="module-title">${m.title}</div><div class="module-desc">${m.desc}</div></div><div class="module-footer"><span>Aguardando liberação</span></div></div>`).join('')}</div>`;
}
function studentCourses(){
  return `<div class="page-header"><h1>Meus Cursos</h1></div>${MODULES.map(mod=>{const lessons=LESSONS[mod.id]||[];return `<div style="margin-bottom:2rem"><div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">${levelBadge(mod.level)}<span style="font-family:var(--font-display);font-size:1.25rem">${mod.title}</span>${!getModuleUnlocked(mod.id)?'<span style="font-size:13px;color:var(--text3)">🔒 Bloqueado</span>':''}</div>${!getModuleUnlocked(mod.id)?`<div style="background:var(--surface2);border-radius:var(--r);padding:1rem;font-size:14px;color:var(--text2)">Este módulo ainda não foi liberado.</div>`:`<div style="display:flex;flex-direction:column;gap:.5rem">${lessons.map(l=>{const done=(currentUser.completedLessons||[]).includes(l.id);const unlocked=getLessonUnlocked(l.id);return `<div style="display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;background:var(--surface);border-radius:var(--r);border:1px solid var(--border2);${unlocked?'cursor:pointer;':'opacity:.5;'}" ${unlocked?`onclick="navigate('lesson','${l.id}')"`:''}><div style="display:flex;align-items:center;gap:10px"><span>${done?'✅':unlocked?'📖':'🔒'}</span><div><div style="font-weight:500">${l.title}</div><div style="font-size:12px;color:var(--text2)">${l.vocab.length} palavras • ${l.exercises.length} exercícios</div></div></div>${unlocked?`<span style="font-size:13px;color:${done?'var(--accent2)':'var(--text3)'}">${done?'Concluída':'Iniciar →'}</span>`:'<span style="font-size:12px;color:var(--text3)">Bloqueada</span>'}</div>`;}).join('')}</div>`}</div>`;}).join('')}`;
}
function studentProgress(){
  const allL=Object.values(LESSONS).flat();
  const done=(currentUser.completedLessons||[]).length;
  const pct=allL.length?Math.round(done/allL.length*100):0;
  const levels=['A1','A2','B1','B2','C1','C2'];
  const idx=levels.indexOf(currentUser.level||'A1');
  return `<div class="page-header"><h1>Meu Progresso</h1></div><div class="teacher-grid"><div class="card"><div class="card-title">📊 Progresso Geral</div><div style="text-align:center;padding:1rem 0"><div style="font-family:var(--font-display);font-size:3.5rem;color:var(--accent)">${pct}%</div><div style="color:var(--text2);font-size:14px">${done} de ${allL.length} aulas</div><div class="progress-bar" style="margin-top:1rem;height:8px"><div class="progress-fill" style="width:${pct}%"></div></div></div></div><div class="card"><div class="card-title">🏆 Trilha CEFR</div>${levels.map((lv,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:.6rem .75rem;border-radius:8px;background:${i===idx?'var(--accent-light)':'transparent'}">${levelBadge(lv)}<span style="font-size:14px;font-weight:${i===idx?600:400}">${MODULES.find(m=>m.level===lv)?.title||lv} ${i<idx?'✓':i===idx?'← atual':''}</span></div>`).join('')}</div></div><div class="card"><div class="card-title">📖 Aulas Concluídas</div>${(currentUser.completedLessons||[]).length===0?'<div class="empty-state"><div style="font-size:2rem">📚</div><div style="font-weight:600;margin:.5rem 0">Nenhuma aula concluída ainda</div></div>':`<div>${(currentUser.completedLessons||[]).map(lid=>{const l=allL.find(x=>x.id===lid);return l?`<div style="padding:.6rem 0;border-bottom:1px solid var(--border2);font-size:14px">✅ ${l.title}</div>`:''}).join('')}</div>`}</div>`;
}

function getLessonLevel(lid){for(const[mid,lessons]of Object.entries(LESSONS)){if(lessons.find(l=>l.id===lid))return MODULES.find(m=>m.id===mid)?.level||'A1';}return'A1';}

function renderLesson(lessonId,el){
  const lesson=Object.values(LESSONS).flat().find(l=>l.id===lessonId);
  if(!lesson){el.innerHTML='<p>Aula não encontrada.</p>';return;}
  currentLesson=lesson;
  const hasG=!!lesson.grammar, hasL=!!lesson.listening;
  el.innerHTML=`<button class="back-btn" onclick="navigate('my-courses')">← Voltar</button>
  <div class="lesson-header"><div><div class="lesson-title">${lesson.title}</div><div class="lesson-subtitle">${lesson.vocab.length} palavras${hasG?' • 📝 Gramática':''}${hasL?' • 🎧 Listening':''} • ✏️ ${lesson.exercises.length} exercícios</div></div><div>${levelBadge(getLessonLevel(lesson.id))}</div></div>
  <div class="tabs"><button class="tab active" onclick="switchTab('vocab',this)">📖 Vocabulário</button>${hasG?'<button class="tab" onclick="switchTab(\'grammar\',this)">📝 Gramática</button>':''}${hasL?'<button class="tab" onclick="switchTab(\'listening\',this)">🎧 Listening</button>':''}<button class="tab" onclick="switchTab('exercises',this)">✏️ Exercícios</button></div>
  <div id="tab-vocab"><div class="vocab-grid">${lesson.vocab.map(v=>`<div class="vocab-item">${v.img?`<img src="${v.img}" alt="${v.w}" style="width:100%;height:100px;object-fit:cover;border-radius:6px;margin-bottom:8px" onerror="this.style.display='none'">`:''}<div class="vocab-word">${v.w}</div><div class="vocab-phonetic">${v.p}</div><div class="vocab-def">${v.d}</div><div class="vocab-example">${v.e}</div></div>`).join('')}</div><div style="margin-top:1.5rem;display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap"><button class="btn-sm primary" onclick="switchTab('${hasG?'grammar':hasL?'listening':'exercises'}',document.querySelectorAll('.tab')[1])">Próximo →</button><button class="btn-sm" onclick="downloadPDF('${lesson.id}')">📄 Baixar PDF</button></div></div>
  ${hasG?`<div id="tab-grammar" style="display:none"><div class="card"><div style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent);margin-bottom:.5rem">${lesson.grammar.title}</div><p style="font-size:14px;color:var(--text2);margin-bottom:1rem">${lesson.grammar.explanation}</p><div class="grammar-box">${lesson.grammar.rules.map(r=>`<div class="grammar-rule"><strong style="color:var(--accent)">${r.s}</strong><span>${r.f} — <em style="color:var(--text2)">${r.e}</em></span></div>`).join('')}<div class="tip-box">${lesson.grammar.tip}</div></div></div><div style="margin-top:1rem;text-align:center"><button class="btn-sm primary" onclick="switchTab('${hasL?'listening':'exercises'}',document.querySelectorAll('.tab')[${hasG?2:1}])">Próximo →</button></div></div>`:''}
  ${hasL?`<div id="tab-listening" style="display:none"><div class="card"><div style="font-family:var(--font-display);font-size:1.1rem;color:var(--accent);margin-bottom:1rem">${lesson.listening.title}</div><div style="background:var(--accent);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap"><div style="color:#fff;font-size:13px;opacity:.8;flex:1">🔊 Ouça o diálogo:</div><div style="display:flex;gap:8px;align-items:center"><button onclick="playTTS()" id="play-btn" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.5rem 1.25rem;border-radius:8px;cursor:pointer;font-size:14px;font-family:var(--font-body)">▶ Ouvir</button><button onclick="stopTTS()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:.5rem .75rem;border-radius:8px;cursor:pointer;font-family:var(--font-body)">⏹</button><select id="tts-speed" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:3px 6px;font-size:13px;font-family:var(--font-body)"><option value="0.7">Lenta</option><option value="0.9" selected>Normal</option><option value="1.1">Rápida</option></select></div></div><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">📄 Transcript:</div><div style="display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem">${lesson.listening.transcript.map((t,i)=>`<div id="tline-${i}" style="display:flex;gap:10px;padding:.6rem .75rem;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent2);transition:all .3s"><span style="font-weight:600;font-size:13px;color:var(--accent);min-width:60px">${t.sp}:</span><span style="font-size:14px">${t.ln}</span></div>`).join('')}</div><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">❓ Questions:</div>${lesson.listening.questions.map((q,i)=>`<div class="exercise" id="lq-${i}"><div class="exercise-q">L${i+1}. ${q.q}</div><div class="exercise-options">${q.o.map((opt,oi)=>`<button class="option-btn" id="lopt-${i}-${oi}" onclick="selectL(${i},${oi})">${opt}</button>`).join('')}</div></div>`).join('')}<div id="l-result"></div><button class="btn-sm primary" onclick="submitL()">Verificar</button></div><div style="margin-top:1rem;text-align:center"><button class="btn-sm primary" onclick="switchTab('exercises',document.querySelectorAll('.tab')[${hasG?3:2}])">Ir para Exercícios →</button></div></div>`:''}
  <div id="tab-exercises" style="display:none"><div class="card">${lesson.exercises.map((ex,i)=>renderEx(ex,i)).join('')}<div id="quiz-result"></div><div style="margin-top:1.5rem"><button class="btn-sm primary" id="submit-btn" onclick="submitQuiz()">Verificar Respostas</button></div></div></div>`;
}

function renderEx(ex,i){
  if(ex.t==='m')return `<div class="exercise"><div class="exercise-q">${i+1}. ${ex.q}</div><div class="exercise-options">${ex.o.map((opt,oi)=>`<button class="option-btn" id="opt-${i}-${oi}" onclick="selectOpt(${i},${oi})">${opt}</button>`).join('')}</div></div>`;
  return `<div class="exercise"><div class="exercise-q">${i+1}. ${ex.q}</div><input class="fill-input" type="text" id="fill-${i}" placeholder="Digite sua resposta..." style="max-width:320px"></div>`;
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  ['tab-vocab','tab-grammar','tab-listening','tab-exercises'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const t=document.getElementById('tab-'+tab);
  if(t)t.style.display='';
  stopTTS();
}

function selectOpt(i,oi){if(quizSubmitted)return;quizAnswers[i]=oi;document.querySelectorAll(`[id^="opt-${i}-"]`).forEach(b=>b.style.background='');const b=document.getElementById(`opt-${i}-${oi}`);if(b)b.style.background='var(--accent-light)';}
function selectL(i,oi){if(listeningSubmitted)return;listeningAnswers[i]=oi;document.querySelectorAll(`[id^="lopt-${i}-"]`).forEach(b=>b.style.background='');const b=document.getElementById(`lopt-${i}-${oi}`);if(b)b.style.background='var(--accent-light)';}

function submitL(){
  if(!currentLesson?.listening)return;
  listeningSubmitted=true;
  let correct=0;
  currentLesson.listening.questions.forEach((q,i)=>{
    const sel=listeningAnswers[i];
    const cb=document.getElementById(`lopt-${i}-${q.a}`);
    if(sel!==undefined){const sb=document.getElementById(`lopt-${i}-${sel}`);if(sel===q.a){if(sb)sb.classList.add('correct');correct++;}else{if(sb)sb.classList.add('wrong');if(cb)cb.classList.add('correct');}}else{if(cb)cb.classList.add('correct');}
  });
  const score=Math.round(correct/currentLesson.listening.questions.length*100);
  const r=document.getElementById('l-result');
  if(r)r.innerHTML=`<div class="result-banner ${score>=60?'pass':'fail'}" style="margin-bottom:1rem"><div class="result-score">${score}%</div><div style="font-size:14px;margin-top:4px">${correct} de ${currentLesson.listening.questions.length} corretas</div></div>`;
}

function submitQuiz(){
  if(!currentLesson)return;
  quizSubmitted=true;
  let correct=0;
  currentLesson.exercises.forEach((ex,i)=>{
    if(ex.t==='m'){const sel=quizAnswers[i];if(sel!==undefined){const sb=document.getElementById(`opt-${i}-${sel}`);const cb=document.getElementById(`opt-${i}-${ex.a}`);if(sel===ex.a){if(sb)sb.classList.add('correct');correct++;}else{if(sb)sb.classList.add('wrong');if(cb)cb.classList.add('correct');}}else{const cb=document.getElementById(`opt-${i}-${ex.a}`);if(cb)cb.classList.add('correct');}}
    else{const inp=document.getElementById(`fill-${i}`);if(inp){if(inp.value.trim().toLowerCase()===ex.a.toLowerCase()){inp.style.borderColor='#2A7D3A';inp.style.background='#EAF7EC';correct++;}else{inp.style.borderColor='var(--red)';inp.style.background='var(--red-light)';}}}
  });
  const score=Math.round(correct/currentLesson.exercises.length*100);
  const pass=score>=60;
  const r=document.getElementById('quiz-result');
  if(r)r.innerHTML=`<div class="result-banner ${pass?'pass':'fail'}"><div class="result-score">${score}%</div><div style="font-size:15px;margin-top:4px">${correct} de ${currentLesson.exercises.length} corretas</div><div style="font-size:14px;margin-top:8px;opacity:.8">${pass?'🎉 Aula concluída com sucesso!':'📚 Continue praticando!'}</div></div>`;
  if(pass&&!(currentUser.completedLessons||[]).includes(currentLesson.id)){
    if(!currentUser.completedLessons)currentUser.completedLessons=[];
    currentUser.completedLessons.push(currentLesson.id);
    const u=DB_USERS.find(x=>x.id===currentUser.id);
    if(u)u.completedLessons=currentUser.completedLessons;
    saveUsers().catch(()=>{});
    showNotif('✅ Aula concluída! Progresso salvo.');
  }
  const btn=document.getElementById('submit-btn');
  if(btn){btn.textContent='Refazer';btn.onclick=()=>navigate('lesson',currentLesson.id);}
}

// TTS
let ttsSpeaking=false,ttsLines=[],ttsIdx=0;
function playTTS(){
  if(!currentLesson?.listening)return;
  if(!window.speechSynthesis){showNotif('Navegador não suporta TTS.');return;}
  stopTTS();ttsSpeaking=true;ttsLines=currentLesson.listening.transcript;ttsIdx=0;
  const btn=document.getElementById('play-btn');if(btn)btn.textContent='⏸ Reproduzindo...';
  speakIdx(0);
}
function speakIdx(i){
  if(!ttsSpeaking||i>=ttsLines.length){const btn=document.getElementById('play-btn');if(btn)btn.textContent='▶ Ouvir novamente';ttsSpeaking=false;hlLine(-1);return;}
  hlLine(i);
  const speed=parseFloat(document.getElementById('tts-speed')?.value||'0.9');
  const u=new SpeechSynthesisUtterance(ttsLines[i].ln);
  u.lang='en-US';u.rate=speed;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(x=>x.lang.startsWith('en')&&x.name.toLowerCase().includes('google'))||voices.find(x=>x.lang==='en-US')||voices.find(x=>x.lang.startsWith('en'));
  if(v)u.voice=v;
  u.onend=()=>{if(ttsSpeaking)setTimeout(()=>speakIdx(i+1),400);};
  u.onerror=()=>speakIdx(i+1);
  window.speechSynthesis.speak(u);
}
function hlLine(i){document.querySelectorAll('[id^="tline-"]').forEach((el,j)=>{el.style.background=j===i?'var(--accent-light)':'var(--bg)';el.style.borderLeftColor=j===i?'var(--accent)':'var(--accent2)';});}
function stopTTS(){window.speechSynthesis?.cancel();ttsSpeaking=false;hlLine(-1);const btn=document.getElementById('play-btn');if(btn)btn.textContent='▶ Ouvir';}

// PDF
function downloadPDF(lessonId){
  const lesson=Object.values(LESSONS).flat().find(l=>l.id===lessonId);
  if(!lesson)return;
  const level=getLessonLevel(lessonId);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;max-width:750px;margin:0 auto;padding:30px;color:#1A1714}.header{text-align:center;border-bottom:3px solid #2C4A3E;padding-bottom:15px;margin-bottom:25px}.logo{font-size:28px;font-weight:bold;color:#2C4A3E}.logo span{color:#C8922A}h2{color:#2C4A3E;font-size:16px;border-left:4px solid #4A7C6F;padding-left:10px;margin-top:25px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#2C4A3E;color:white;padding:8px 10px;text-align:left;font-size:13px}td{padding:7px 10px;border-bottom:1px solid #eee;font-size:13px}tr:nth-child(even) td{background:#F5F2EC}.ex{margin-bottom:18px}.eq{font-weight:bold;font-size:13px;margin-bottom:8px}.opt{font-size:12px;padding:4px 8px;border:1px solid #ccc;border-radius:4px;margin:2px 0}.line{border-bottom:1px solid #333;display:inline-block;width:150px;margin:0 4px}.gb{background:#E8F0EE;border-radius:8px;padding:12px 15px;margin-bottom:15px}.gr{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:6px 0;border-bottom:1px solid #ccc;font-size:12px}.gr:last-child{border-bottom:none}.tip{background:#FBF3E3;border:1px solid #C8922A;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:10px}.footer{text-align:center;margin-top:30px;padding-top:15px;border-top:1px solid #eee;font-size:11px;color:#9E9892}</style></head><body><div class="header"><div class="logo">English<span>Path</span></div><div style="font-size:20px;font-weight:bold;margin:8px 0">${lesson.title}</div><div style="font-size:13px;color:#6B6560">Nível: ${level} | Data: ${new Date().toLocaleDateString('pt-BR')} | Aluno(a): ________________________</div></div><h2>📖 Vocabulário</h2><table><tr><th>Palavra</th><th>Pronúncia</th><th>Tradução</th><th>Exemplo</th></tr>${lesson.vocab.map(v=>`<tr><td><strong>${v.w}</strong></td><td>${v.p}</td><td>${v.d}</td><td><em>${v.e}</em></td></tr>`).join('')}</table>${lesson.grammar?`<h2>📝 Gramática — ${lesson.grammar.title}</h2><div class="gb"><p style="font-size:12px;margin:0 0 10px">${lesson.grammar.explanation}</p>${lesson.grammar.rules.map(r=>`<div class="gr"><strong>${r.s}</strong><span>${r.f} — <em>${r.e}</em></span></div>`).join('')}<div class="tip">${lesson.grammar.tip}</div></div>`:''}<h2>✏️ Exercícios</h2>${lesson.exercises.map((ex,i)=>`<div class="ex"><div class="eq">${i+1}. ${ex.q}</div>${ex.t==='m'?ex.o.map(opt=>`<div class="opt">( ) ${opt}</div>`).join(''):`<p style="font-size:13px">Resposta: <span class="line"></span></p>`}</div>`).join('')}<div class="footer">EnglishPath — englishpathnet.netlify.app</div></body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank');
  if(win)win.onload=()=>setTimeout(()=>win.print(),500);
  showNotif('📄 PDF aberto! Use Ctrl+P para imprimir.');
}

// TEACHER ACTIONS
async function toggleModule(modId,value){DB_MODULE_UNLOCKS[modId]=value;await saveUnlocks();showNotif(`Módulo ${value?'liberado':'bloqueado'}.`);navigate(currentView);}
async function toggleLesson(lessonId,value){DB_LESSON_UNLOCKS[lessonId]=value;await saveUnlocks();showNotif(`Aula ${value?'liberada':'bloqueada'}.`);navigate(currentView);}
async function promoteStudent(userId){const u=DB_USERS.find(x=>x.id===userId);if(!u)return;const lvs=['A1','A2','B1','B2','C1','C2'];const i=lvs.indexOf(u.level||'A1');if(i<lvs.length-1){u.level=lvs[i+1];await saveUsers();showNotif(`${u.name} promovido para ${u.level}!`);navigate('students');}else showNotif('Já está no nível máximo.');}
async function resetStudent(userId){const u=DB_USERS.find(x=>x.id===userId);if(!u)return;u.completedLessons=[];u.level='A1';u.quizScores={};await saveUsers();showNotif(`Progresso de ${u.name} resetado.`);navigate('students');}
